# ──────────────────────────────────────────
# Sources
# ──────────────────────────────────────────

[sources.game_logs]
type = "file"
include = ["/logs/game/**/*.log"]
read_from = "beginning"

[sources.docker_logs]
type = "docker_logs"
include_labels = ["vector.service"]

# ──────────────────────────────────────────
# Transforms: Game Server 로그 파싱
# ──────────────────────────────────────────

[transforms.parse_game]
type = "remap"
inputs = ["game_logs"]
source = '''
.message = strip_whitespace!(.message)

parsed, err = parse_regex(
  .message,
  r'^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \| (?P<level>\w+)\s+\| \[(?P<world>[SC]):(?P<category>\w+)\] (?P<msg>.*)'
)
if err != null { abort }

.timestamp = parse_timestamp!(parsed.ts, format: "%Y-%m-%d %H:%M:%S%.3f")
.service = "game"
.level = upcase(strip_whitespace!(parsed.level))
.world = parsed.world
.category = parsed.category
.message = strip_whitespace!(parsed.msg)

# key=value 패턴에서 구조화 필드 추출
nid, err = parse_regex(.message, r'networkId=(?P<v>\d+)')
if err == null { .network_id = to_int!(nid.v) } else { .network_id = 0 }

gid, err = parse_regex(.message, r'idx=(?P<v>\d+)')
if err == null { .ghost_id = to_int!(gid.v) } else { .ghost_id = 0 }

# 환경변수 기본값
.build_version = get_env_var("BUILD_VERSION") ?? "dev"
.session_id = get_env_var("SESSION_ID") ?? "local"
.server_id = get_env_var("SERVER_ID") ?? "dev-1"
.record_type = "log"
.violation_type = ""
.entity_type = ""
.team_id = 0
.context = "{}"
'''

# ──────────────────────────────────────────
# Transforms: C++ 서버 로그 파싱
# ──────────────────────────────────────────

[transforms.parse_cpp]
type = "remap"
inputs = ["docker_logs"]
source = '''
svc = get!(value: .label, path: ["vector.service"])
.service = to_string(svc) ?? "unknown"

parsed, err = parse_regex(
  .message,
  r'^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \| (?P<level>\w+)\s+\| \[(?P<category>[\w:]+)\] (?P<msg>.*)'
)
if err != null { abort }

.timestamp = parse_timestamp!(parsed.ts, format: "%Y-%m-%d %H:%M:%S%.3f")
.level = upcase!(parsed.level)
.category = parsed.category
.message = parsed.msg

.build_version = get_env_var("BUILD_VERSION") ?? "dev"
.session_id = ""
.server_id = get_env_var("SERVER_ID") ?? "dev-1"
.record_type = "log"
.world = ""
.violation_type = ""
.entity_type = ""
.ghost_id = 0
.team_id = 0
.network_id = 0
.context = "{}"
'''

# ──────────────────────────────────────────
# Transform: Chat:Message 분기 + 파싱
# ──────────────────────────────────────────

[transforms.route_cpp]
type = "route"
inputs = ["parse_cpp"]

  [transforms.route_cpp.route]
  chat_message = '.category == "Chat:Message"'

[transforms.extract_chat_fields]
type = "remap"
inputs = ["route_cpp.chat_message"]
source = '''
parsed, err = parse_regex(
  .message,
  r'^channel=(?P<channel>[^,]+), sender_id=(?P<sender_id>[^,]+), sender_name=(?P<sender_name>[^,]+), session_id=(?P<session_id>[^,]*), target_id=(?P<target_id>[^,]*), content=(?P<content>.*)'
)
if err != null { abort }

.channel = parsed.channel
.sender_id = parsed.sender_id
.sender_name = parsed.sender_name
.session_id = parsed.session_id
.target_id = parsed.target_id
.content = parsed.content

del(.service)
del(.level)
del(.category)
del(.message)
del(.build_version)
del(.server_id)
del(.record_type)
del(.world)
del(.violation_type)
del(.entity_type)
del(.ghost_id)
del(.team_id)
del(.network_id)
del(.context)
del(.file)
del(.host)
del(.source_type)
del(.label)
del(.stream)
del(.container_created_at)
del(.container_id)
del(.container_name)
del(.image)
'''

# ──────────────────────────────────────────
# Transform: 메타데이터 제거 + Sink: ClickHouse
# ──────────────────────────────────────────

[transforms.clean_fields]
type = "remap"
inputs = ["parse_game", "route_cpp._unmatched"]
source = '''
del(.file)
del(.host)
del(.source_type)
del(.label)
del(.stream)
del(.container_created_at)
del(.container_id)
del(.container_name)
del(.image)
'''

[sinks.clickhouse]
type = "clickhouse"
inputs = ["clean_fields"]
endpoint = "http://clickhouse:8123"
database = "project_sos"
table = "service_events"
auth.strategy = "basic"
auth.user = "default"
auth.password = "${CH_PASSWORD}"

# 배치: 이벤트를 모아서 한 번에 전송 (ClickHouse는 큰 배치에 최적화)
batch.max_events = 1000
batch.timeout_secs = 5

# 버퍼: 버스트 시 디스크 버퍼로 유실 방지
[sinks.clickhouse.buffer]
type = "disk"
max_size = 536870912        # 512 MB
when_full = "block"

# ──────────────────────────────────────────
# Sink: 채팅 메시지 → ClickHouse chat_messages
# ──────────────────────────────────────────

[sinks.clickhouse_chat_messages]
type = "clickhouse"
inputs = ["extract_chat_fields"]
endpoint = "http://clickhouse:8123"
database = "project_sos"
table = "chat_messages"
auth.strategy = "basic"
auth.user = "default"
auth.password = "${CH_PASSWORD}"

batch.max_events = 500
batch.timeout_secs = 5

[sinks.clickhouse_chat_messages.buffer]
type = "disk"
max_size = 268435488        # 256 MB (Vector 최소 요구값)
when_full = "block"
