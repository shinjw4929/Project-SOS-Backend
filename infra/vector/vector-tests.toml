# Vector VRL 파싱 단위 테스트
#
# 실행:
#   vector test --config-toml vector.toml --config-toml vector-tests.toml
#
# Docker 환경:
#   docker compose cp infra/vector/vector-tests.toml vector:/tmp/vector-tests.toml
#   docker exec <container> vector test \
#     --config-toml /etc/vector/vector.toml \
#     --config-toml /tmp/vector-tests.toml

# ──────────────────────────────────────────
# Game Server 파싱 (parse_game → clean_fields)
# ──────────────────────────────────────────

[[tests]]
name = "game_info_with_network_id"

  [[tests.inputs]]
  insert_at = "parse_game"
  type = "log"
    [tests.inputs.log_fields]
    message = "2026-03-16 12:34:43.415 | INFO    | [S:Network] Client connected, networkId=1"

  [[tests.outputs]]
  extract_from = "clean_fields"
    [[tests.outputs.conditions]]
    type = "vrl"
    source = '''
    assert_eq!(.service, "game")
    assert_eq!(.level, "INFO")
    assert_eq!(.world, "S")
    assert_eq!(.category, "Network")
    assert_eq!(.message, "Client connected, networkId=1")
    assert_eq!(.network_id, 1)
    assert_eq!(.ghost_id, 0)
    '''

