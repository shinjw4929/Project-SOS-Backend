# ──────────────────────────────────────────
# C++ Server 파싱 (clean_fields 직접 주입)
#
# parse_cpp는 docker_logs의 .label 중첩 객체를 필요로 하는데,
# Vector test framework의 log_fields는 flat 값만 지원하므로
# clean_fields에 직접 주입하여 필드 구조와 메타데이터 제거를 검증한다.
# ──────────────────────────────────────────

[[tests]]
name = "cpp_room_fields_pass_through"

  [[tests.inputs]]
  insert_at = "clean_fields"
  type = "log"
    [tests.inputs.log_fields]
    service = "room"
    level = "INFO"
    category = "Room"
    message = "Room started, rooms=5, players=8"
    source_type = "docker_logs"
    stream = "stdout"
    container_id = "abc123"
    container_name = "room-server"

  [[tests.outputs]]
  extract_from = "clean_fields"
    [[tests.outputs.conditions]]
    type = "vrl"
    source = '''
    assert_eq!(.service, "room")
    assert_eq!(.level, "INFO")
    assert_eq!(.category, "Room")
    assert_eq!(.message, "Room started, rooms=5, players=8")
    assert!(!exists(.source_type))
    assert!(!exists(.stream))
    assert!(!exists(.container_id))
    assert!(!exists(.container_name))
    '''

[[tests]]
name = "cpp_chat_fields_pass_through"

  [[tests.inputs]]
  insert_at = "clean_fields"
  type = "log"
    [tests.inputs.log_fields]
    service = "chat"
    level = "WARNING"
    category = "Chat"
    message = "Rate limited, channel=LOBBY, rate_limit=1"
    label = "should_be_removed"

  [[tests.outputs]]
  extract_from = "clean_fields"
    [[tests.outputs.conditions]]
    type = "vrl"
    source = '''
    assert_eq!(.service, "chat")
    assert_eq!(.level, "WARNING")
    assert!(!exists(.label))
    '''

# ──────────────────────────────────────────
# Chat:Message 파싱 (extract_chat_fields)
# ──────────────────────────────────────────

[[tests]]
name = "chat_message_extracted"

  [[tests.inputs]]
  insert_at = "extract_chat_fields"
  type = "log"
    [tests.inputs.log_fields]
    timestamp = "2026-04-08T10:00:01.100Z"
    message = "channel=ALL, sender_id=player1, sender_name=John, session_id=sess-abc, target_id=, content=hello world"

  [[tests.outputs]]
  extract_from = "extract_chat_fields"
    [[tests.outputs.conditions]]
    type = "vrl"
    source = '''
    assert_eq!(.channel, "ALL")
    assert_eq!(.sender_id, "player1")
    assert_eq!(.sender_name, "John")
    assert_eq!(.session_id, "sess-abc")
    assert_eq!(.target_id, "")
    assert_eq!(.content, "hello world")
    assert!(!exists(.service))
    assert!(!exists(.level))
    '''

