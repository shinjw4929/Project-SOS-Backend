services:
  # === 공통 인프라 ===
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devredis}"]
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml
    environment:
      CLICKHOUSE_DB: project_sos
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-dev123}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password ${CH_PASSWORD:-dev123} -q 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  vector:
    image: timberio/vector:0.41.1-debian
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - ./infra/vector/vector.toml:/etc/vector/vector.toml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${GAME_LOG_PATH:-./.empty}:/logs/game:ro
      - vector_data:/var/lib/vector
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-dev}
      SESSION_ID: ${SESSION_ID:-local}
      SERVER_ID: ${SERVER_ID:-dev-1}
      CH_PASSWORD: ${CH_PASSWORD:-dev123}

  grafana:
    image: grafana/grafana:11.4.0
    ports: ["3000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/ds.yml
      - ./infra/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CH_PASSWORD: ${CH_PASSWORD:-dev123}
    depends_on:
      clickhouse:
        condition: service_healthy

  # === 게임 서비스 ===
  chat-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: chat-server
    ports: ["8082:8082", "8083:8083"]
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    labels:
      vector.service: "chat"
    restart: unless-stopped

  room-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: room-server
    ports: ["8080:8080", "8081:8081"]
    depends_on:
      redis: { condition: service_healthy }
      chat-server: { condition: service_started }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
      CHAT_SERVER_HOST: chat-server
      CHAT_SERVER_PORT: 8083
    labels:
      vector.service: "room"
    restart: unless-stopped

volumes:
  redis_data:
  clickhouse_data:
  grafana_data:
  vector_data:
